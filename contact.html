<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/js/scripts.js"></script>
</head>
<body>
    <div class="container">
        <h2>Contact Me</h2>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Navigation:</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="./index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="./experience.html">Experience</a></li>
                        <li class="nav-item"><a class="nav-link" href="./education.html">Education</a></li>
                        <li class="nav-item"><a class="nav-link" href="./aboutme.html">About Me</a></li>
                        <li class="nav-item"><a class="nav-link" href="./contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <form id="contactForm" class="mt-4">
            <div class="mb-3">
            <label class="form-label">Name and/or Company</label>
            <input type="text" class="form-control" id="name">
            </div>
            <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email">
            </div>
            <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" id="message" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send</button>
        </form>
        <div id="successMsg" class="alert alert-success mt-3 d-none">
        Your message has been sent, I will reach out to you as soon as possible!
        </div>
        <div id="errorMsg" class="alert alert-danger mt-3 d-none">
        Please fill out all fields correctly.
        </div>
    </div>
</body>
